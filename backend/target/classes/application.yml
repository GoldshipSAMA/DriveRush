server:
  port: 3000

spring:
  application:
    name: drive-rush-cloud-sync
  datasource:
    url: jdbc:mysql://localhost:3306/drive_rush?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
      encoding: UTF-8
  jackson:
    time-zone: Asia/Shanghai

app:
  jwt:
    secret: ${DR_JWT_SECRET:drive-rush-dev-secret-change-me}
    ttl-hours: 168

logging:
  level:
    root: INFO
